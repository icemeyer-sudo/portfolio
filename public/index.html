<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <title>Meyer Didier | Web développeur</title>
        <link rel="stylesheet" href="css/reset.css">
        <link rel="stylesheet" href="css/style.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=block" rel="stylesheet">
    </head>
    <body>
        <template id="alert">
        <div class="alert-form-container">
            <div class="alert-form">
                <p>Message</p>
                <span class="close-alert">X</span>
            </div>
        </div>
        </template>
        <header>
            <nav id="nav-header">
                <ul>
                    <li class="active"><a href="#">Didier Meyer</a></li>
                    <li><a href="#about">À propros</a></li>
                    <li><a href="#projects">Mes projets</a></li>
                    <li><a href="#contact">Contactez-moi</a></li>
                </ul>
            </nav>
        </header>
        <main>
            <section id="hero-section">
                <div id="title-hero">
                    <h1>Développeur_<span>web</span></h1>
                    <h2>Didier Meyer</h2>
                    <p>Vous avez un projet de site web ?</p>
                    <!-- <a href="#contact"><button>Lancez-vous</button></a> -->
                </div>
                <div id="parallax-sky"></div>
                <div id="parallax-mountains"></div>
                <div id="parallax-forest"></div>
            </section>
            <section id="about">
                <div>
                    <div class="title-with-markdown"><div class="markdown"></div><h2>Qui suis-je ?</h2></div>
                    <div class="about-waterfall">
                        <img src="img/dev-back.png">
                        <div class="div-skeleton">
                            <span class="span-skeleton"></span>
                            <span class="span-skeleton"></span>
                            <span class="span-skeleton"></span>
                        </div>
                    </div>
                </div>
            </section>
            <section id="projects">
                <div>
                    <div class="title-with-markdown"><div class="markdown"></div><h2>Mes projets</h3></div>
                    <div class="div-projects">
                        <div class="cards">
                            <div class="cards-image">
                                <img src="/img/image01.jpg" alt="#">
                            </div>
                            <div class="cards-description">
                                <h3></h3>
                                <p></p>
                                <a href="#"></a>
                                <p></p>
                            </div>
                        </div>
                        <div class="cards inv">
                            <div class="cards-image">
                                <img src="/img/image02.jpg" alt="#">
                            </div>
                            <div class="cards-description">
                                <h3></h3>
                                <p></p>
                                <a href="#"></a>
                                <p></p>
                            </div>
                        </div>
                        <div class="cards">
                           <div class="cards-image">
                                <img src="/img/image03.jpg" alt="#">
                            </div>
                            <div class="cards-description">
                                <h3></h3>
                                <p></p>
                                <a href="#"></a>
                                <p></p>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
            <section id="contact">
                <div>
                    <img src="/img/lettre.webp" class="letter">
                    <div class="title-with-markdown"><div class="markdown"></div><h2>Contactez-moi</h2></div>
                    <form>
                        <div class="div-form">
                            <div class="div-input">
                                <label for="name">Nom</label>
                                <input type="text" name="name" id="name" required>
                            </div>
                            <div class="div-input">
                                <label for="email">Email</label>
                                <input type="email" name="email" id="email" required>
                            </div>
                        </div>
                        <div  class="div-input one-column">
                            <label for="content">Message</label>
                            <textarea name="content" id="content"></textarea>
                        </div>
                        <div class="button-form">
                            <button class="post">Envoyez</button>
                        </div>
                    </form>
                </div>
            </section>
        </main>
        <footer>
            <div>
                <ul>
                    <li>© Didier Meyer</li>
                    <li>20 rue Lafayette - 39000 Lons-le-Sauner</li>
                </ul>
            </div>
        </footer>
        <script src="js/main/main.js" type="module" defer></script>
    </body>
</html>
